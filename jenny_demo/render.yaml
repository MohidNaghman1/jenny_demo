services:
  - type: web
    name: business-knowledge-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt && python3 ingestion/ingest.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
    plan: free