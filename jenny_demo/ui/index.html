<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Knowledge Assistant</title>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0b0f1a;
    --sidebar-bg: #0e1525;
    --surface:    #131929;
    --surface2:   #1a2236;
    --border:     #1f2d47;
    --accent:     #3b82f6;
    --accent2:    #6366f1;
    --text:       #e2e8f0;
    --text-muted: #8899aa;
    --user-bg:    #1e3a5f;
    --bot-bg:     #131929;
    --badge-vector: #3b82f6;
    --badge-sql:    #10b981;
    --badge-hybrid: #8b5cf6;
    --tag-pdf:    #2563eb;
    --tag-db:     #059669;
    --radius:     10px;
    --font:       'Inter', 'Segoe UI', system-ui, sans-serif;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

  /* ── Layout ───────────────────────────────────────────────── */
  #app { display: flex; height: 100vh; }

  /* ── Sidebar ──────────────────────────────────────────────── */
  #sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
  }
  #sidebar-content::-webkit-scrollbar { width: 4px; }
  #sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
    animation: fadeSlide .3s ease;
  }

  .entry-question {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-style: italic;
    line-height: 1.4;
  }

  .route-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .badge-vector  { background: rgba(59,130,246,.18); color: var(--badge-vector); border: 1px solid rgba(59,130,246,.3); }
  .badge-sql     { background: rgba(16,185,129,.18); color: var(--badge-sql);    border: 1px solid rgba(16,185,129,.3); }
  .badge-hybrid  { background: rgba(139,92,246,.18); color: var(--badge-hybrid); border: 1px solid rgba(139,92,246,.3); }

  .reasoning-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .reasoning-text {
    font-size: 12px;
    color: var(--text);
    line-height: 1.5;
  }

  .sidebar-empty {
    color: var(--text-muted);
    font-size: 12px;
    text-align: center;
    padding: 30px 10px;
    line-height: 1.7;
  }

  /* ── Main ─────────────────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Header */
  #topbar {
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--sidebar-bg);
    flex-shrink: 0;
  }
  #topbar .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #topbar .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; }
  #topbar .sub { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #10b981; margin-left: auto;
    box-shadow: 0 0 6px #10b981;
  }

  /* Chat area */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #chat-area::-webkit-scrollbar { width: 5px; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome / chips */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    text-align: center;
    padding: 40px 20px;
  }
  #welcome .welcome-icon {
    font-size: 44px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 12px rgba(99,102,241,.5));
  }
  #welcome h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  #welcome p  { color: var(--text-muted); font-size: 13px; max-width: 380px; line-height: 1.6; margin-bottom: 28px; }

  .chip-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 560px;
    width: 100%;
  }
  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    transition: border-color .2s, background .2s;
  }
  .chip:hover { border-color: var(--accent); background: var(--surface2); }
  .chip-icon { font-size: 16px; display: block; margin-bottom: 6px; }

  /* Messages */
  .msg-row {
    display: flex;
    animation: fadeSlide .25s ease;
  }
  .msg-row.user  { justify-content: flex-end; }
  .msg-row.bot   { justify-content: flex-start; }

  .msg-bubble {
    max-width: 70%;
    border-radius: var(--radius);
    padding: 12px 16px;
    line-height: 1.6;
    font-size: 13.5px;
  }
  .msg-row.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(59,130,246,.3);
    color: #cfe4ff;
  }
  .msg-row.bot .msg-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
  }

  /* Citations */
  .citations {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .cite-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 500;
  }
  .cite-pdf { background: rgba(37,99,235,.2); color: #93c5fd; border: 1px solid rgba(37,99,235,.35); }
  .cite-db  { background: rgba(5,150,105,.2); color: #6ee7b7; border: 1px solid rgba(5,150,105,.35); }

  /* Sources panel */
  .sources-panel {
    margin-top: 10px;
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .sources-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  .source-item {
    font-size: 11.5px;
    color: var(--text-muted);
    padding: 2px 0;
  }
  .source-item::before { content: "↳ "; color: var(--accent); }

  /* Spinner */
  .spinner-row {
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeSlide .2s ease;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  .spinner-text { color: var(--text-muted); font-size: 12px; font-style: italic; }

  /* Input bar */
  #input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--sidebar-bg);
    flex-shrink: 0;
  }
  #input-wrap {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px 4px 4px 16px;
    transition: border-color .2s;
  }
  #input-wrap:focus-within { border-color: var(--accent); }

  #question-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 13.5px;
    line-height: 1.5;
    resize: none;
    padding: 8px 0;
    max-height: 120px;
    overflow-y: auto;
  }
  #question-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: opacity .2s, transform .15s;
    flex-shrink: 0;
  }
  #send-btn:hover:not(:disabled) { opacity: .85; transform: scale(1.05); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h2>Agent Reasoning</h2>
    </div>
    <div id="sidebar-content">
      <div class="sidebar-empty" id="sidebar-empty">
        Ask a question to see<br>route decisions here.
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <div>
          <h1>Business Assistant</h1>
        </div>
        <span class="sub">Hybrid RAG</span>
      </div>
      <div id="status-dot" title="API reachable"></div>
    </div>

    <div id="chat-area">
      <div id="welcome">
        <div class="welcome-icon">💼</div>
        <h2>Business Knowledge Assistant</h2>
        <p>Ask questions about contracts, payments, or anything that spans both. Powered by Groq + LangGraph.</p>
        <div class="chip-grid">
          <button class="chip" onclick="sendChip(this)">
            Which customers have overdue payments?
          </button>
          <button class="chip" onclick="sendChip(this)">
            What does the contract say about service suspension?
          </button>
          <button class="chip" onclick="sendChip(this)">
            Which customers have overdue payments and what does their contract say about suspension?
          </button>
          <button class="chip" onclick="sendChip(this)">
            What is the refund policy?
          </button>
        </div>
      </div>
    </div>

    <div id="input-bar">
      <div id="input-wrap">
        <textarea
          id="question-input"
          rows="1"
          placeholder="Ask about contracts or payments…"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendQuestion()" title="Send">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// API URL: set window.API_BASE before this script to override (e.g. Railway URL)
// Or update this line directly when deploying.
const API = window.API_BASE || "https://jenny-demo.onrender.com";
let busy = false;

// ── Helpers ────────────────────────────────────────────────────────────────

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendQuestion(); }
}

function sendChip(btn) {
  const text = btn.innerText.trim();
  document.getElementById("question-input").value = text;
  sendQuestion();
}

function removeWelcome() {
  const w = document.getElementById("welcome");
  if (w) w.remove();
}

function scrollBottom() {
  const ca = document.getElementById("chat-area");
  ca.scrollTop = ca.scrollHeight;
}

// ── Render helpers ─────────────────────────────────────────────────────────

function routeClass(route) {
  if (route === "vector") return "badge-vector";
  if (route === "sql")    return "badge-sql";
  return "badge-hybrid";
}

function parseCitations(answer) {
  // Pull [Source: …] tags from answer text
  const pdf = [], db = [];
  const re = /\[Source:\s*([^\]]+)\]/gi;
  let m;
  while ((m = re.exec(answer)) !== null) {
    const raw = m[1].trim();
    if (/contract|pdf/i.test(raw)) pdf.push(raw);
    else db.push(raw);
  }
  return { pdf: [...new Set(pdf)], db: [...new Set(db)] };
}

function buildCitationTags(answer) {
  const { pdf, db } = parseCitations(answer);
  if (!pdf.length && !db.length) return "";
  let html = '<div class="citations">';
  pdf.forEach(c => { html += `<span class="cite-tag cite-pdf">📄 ${escHtml(c)}</span>`; });
  db.forEach(c  => { html += `<span class="cite-tag cite-db">🗄 ${escHtml(c)}</span>`; });
  html += "</div>";
  return html;
}

function buildSourcesPanel(sources) {
  if (!sources || !sources.length) return "";
  let html = '<div class="sources-panel"><div class="sources-label">Sources used</div>';
  sources.forEach(s => { html += `<div class="source-item">${escHtml(s)}</div>`; });
  html += "</div>";
  return html;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function addMessage(role, html) {
  const ca = document.getElementById("chat-area");
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;
  row.innerHTML = `<div class="msg-bubble">${html}</div>`;
  ca.appendChild(row);
  scrollBottom();
  return row;
}

function addSpinner() {
  const ca = document.getElementById("chat-area");
  const el = document.createElement("div");
  el.className = "spinner-row";
  el.id = "spinner";
  el.innerHTML = `<div class="spinner"></div><span class="spinner-text">Agent is reasoning…</span>`;
  ca.appendChild(el);
  scrollBottom();
}

function removeSpinner() {
  const s = document.getElementById("spinner");
  if (s) s.remove();
}

function addSidebarEntry(question, route, reasoning) {
  const sc = document.getElementById("sidebar-content");
  const empty = document.getElementById("sidebar-empty");
  if (empty) empty.remove();

  const entry = document.createElement("div");
  entry.className = "sidebar-entry";
  entry.innerHTML = `
    <div class="entry-question">"${escHtml(question)}"</div>
    <span class="route-badge ${routeClass(route)}">${escHtml(route)}</span>
    <div class="reasoning-label">Reasoning</div>
    <div class="reasoning-text">${escHtml(reasoning)}</div>
  `;
  sc.insertBefore(entry, sc.firstChild);
}

// ── Send ───────────────────────────────────────────────────────────────────

async function sendQuestion() {
  if (busy) return;
  const input = document.getElementById("question-input");
  const question = input.value.trim();
  if (!question) return;

  busy = true;
  document.getElementById("send-btn").disabled = true;
  input.value = "";
  input.style.height = "auto";

  removeWelcome();
  addMessage("user", escHtml(question));
  addSpinner();

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000); // 60 sec timeout
    const res = await fetch(`${API}/ask`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
      signal: controller.signal,
    });
    clearTimeout(timeout);

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || "Server error");
    }

    const data = await res.json();
    removeSpinner();

    const answerHtml =
      escHtml(data.answer).replace(/\n/g, "<br>") +
      buildCitationTags(data.answer) +
      buildSourcesPanel(data.sources);

    addMessage("bot", answerHtml);
    addSidebarEntry(question, data.route, data.reasoning);

  } catch (err) {
    removeSpinner();
    addMessage("bot", `<span style="color:#f87171">⚠ ${escHtml(err.message)}</span><br><span style="color:var(--text-muted);font-size:12px">Make sure the backend is running: <code>Backend Issue</code></span>`);
  }

  busy = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("question-input").focus();
}

// ── Health check ───────────────────────────────────────────────────────────

(async function checkHealth() {
  const dot = document.getElementById("status-dot");
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(3000) });
    if (r.ok) { dot.style.background = "#10b981"; dot.style.boxShadow = "0 0 6px #10b981"; dot.title = "API online"; }
    else throw new Error();
  } catch {
    dot.style.background = "#f87171";
    dot.style.boxShadow = "0 0 6px #f87171";
    dot.title = "API offline — start backend first";
  }
})();
// Ping backend every 10 minutes to prevent Render free tier sleep
setInterval(() => fetch(`${API}/health`).catch(() => {}), 10 * 60 * 1000);
// Also ping immediately on page load to wake it up
fetch(`${API}/health`).catch(() => {});
</script>
</body>
</html>
