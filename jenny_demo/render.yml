services:
  - type: web
    name: business-knowledge-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: PORT
        value: 8000
    autoDeploy: true
    disk:
      name: faiss-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1